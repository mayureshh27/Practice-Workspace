version: '3.8'

# Infrastructure dependencies for PracDaGo.
# - Qdrant: vector store for source-chunk retrieval (hybrid BM25 + dense)
# - Memgraph: removed — Graphiti now uses embedded Kuzu backend (graphiti-core[kuzu])
#   No Docker service needed for temporal mastery edges.
# - Kuzu: embedded directly in the Python process — no Docker needed.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: learning_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
