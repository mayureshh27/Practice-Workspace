version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: learning_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph:latest
    container_name: learning_memgraph
    ports:
      - "7687:7687"
    volumes:
      - memgraph_data:/var/lib/memgraph
    restart: unless-stopped

volumes:
  qdrant_data:
  memgraph_data:
